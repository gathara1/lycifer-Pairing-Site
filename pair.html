<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAPPIER-XMD | Premium Pairing Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: linear-gradient(135deg, #00ff88, #00cc66, #0099ff);
      --secondary: linear-gradient(135deg, #ff2e63, #7209b7);
      --bg: #0a0a12;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-dark: rgba(0, 0, 0, 0.5);
      --text: #ffffff;
      --muted: #a0a0c0;
      --highlight: #00ff88;
      --highlight-glow: 0 0 25px rgba(0, 255, 136, 0.5);
      --radius: 20px;
      --blur: 15px;
      --transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      color: var(--text);
      background: var(--bg);
      padding: 100px 20px 150px;
    }

    /* Animated Background */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
      background: 
        radial-gradient(circle at 20% 80%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(0, 204, 102, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(0, 153, 255, 0.08) 0%, transparent 50%);
      animation: bgPulse 15s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Particle Background */
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--glass);
      backdrop-filter: blur(var(--blur));
      z-index: 100;
      border-bottom: 1px solid rgba(0, 255, 136, 0.15);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-img {
      height: 45px;
      width: 45px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--highlight);
      box-shadow: var(--highlight-glow);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
      50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.8); }
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      background: var(--primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      letter-spacing: 1px;
    }

    .logo-text span {
      font-size: 0.7rem;
      display: block;
      -webkit-text-fill-color: var(--muted);
      background: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      letter-spacing: 2px;
    }

    /* Battery Indicator */
    .battery-container {
      background: var(--glass-dark);
      border-radius: 50px;
      padding: 0.5rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      border: 1px solid rgba(0, 255, 136, 0.15);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }

    .battery-icon {
      color: var(--highlight);
      font-size: 1.2rem;
      filter: drop-shadow(0 0 5px var(--highlight));
    }

    /* Main Container */
    .main-content {
      width: 100%;
      max-width: 550px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: relative;
      z-index: 1;
    }

    /* Box */
    .box {
      background: var(--glass);
      backdrop-filter: blur(var(--blur));
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0, 255, 136, 0.1);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
    }

    .box:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), var(--highlight-glow);
    }

    .box h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      background: var(--primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      letter-spacing: 1px;
    }

    .box .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .box .powered {
      font-size: 0.8rem;
      color: var(--highlight);
      margin-bottom: 1.5rem;
      opacity: 0.7;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }

    /* Input */
    .input-container {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .input-container input {
      flex: 1;
      padding: 1rem 1.2rem;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--glass-dark);
      color: var(--text);
      font-family: inherit;
      transition: var(--transition);
      font-size: 1rem;
      min-width: 150px;
    }

    .input-container input:focus {
      outline: none;
      border-color: var(--highlight);
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.2);
    }

    .input-container input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .input-container button {
      padding: 1rem 1.8rem;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
    }

    .input-container button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), var(--highlight-glow);
    }

    .input-container button:active {
      transform: scale(0.97);
    }

    /* Result */
    #pair-result {
      margin-top: 1.5rem;
      padding: 1.2rem;
      border-radius: var(--radius);
      background: var(--glass-dark);
      border: 1px solid rgba(255, 255, 255, 0.05);
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      font-size: 0.95rem;
      color: var(--muted);
    }

    #pair-result .code-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: var(--highlight);
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
      letter-spacing: 2px;
      word-break: break-all;
    }

    #pair-result .error {
      color: #ff4444;
      font-weight: 600;
    }

    #pair-result .success {
      color: var(--highlight);
      font-weight: 600;
    }

    /* Copy Button */
    #copy-code {
      background: var(--glass);
      border: 2px solid var(--highlight);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      font-weight: 700;
      transition: var(--transition);
      margin-top: 1.2rem;
      display: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
    }

    #copy-code:hover {
      background: rgba(0, 255, 136, 0.1);
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
      transform: translateY(-3px);
    }

    /* Music Player */
    .music-player {
      width: 100%;
      max-width: 550px;
      background: var(--glass);
      backdrop-filter: blur(var(--blur));
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0, 255, 136, 0.1);
      z-index: 90;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .music-player::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--secondary);
    }

    .music-player h3 {
      color: var(--highlight);
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
      font-family: 'Orbitron', sans-serif;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
      letter-spacing: 1px;
    }

    .music-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
      background: var(--secondary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .music-subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    .play-btn {
      background: var(--secondary);
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      transition: var(--transition);
    }

    .play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 46, 99, 0.4);
    }

    .play-btn i {
      color: white;
      font-size: 1.5rem;
    }

    .time-display {
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Orbitron', sans-serif;
    }

    .progress-container {
      width: 100%;
      height: 4px;
      background: var(--glass-dark);
      border-radius: 2px;
      margin-top: 0.8rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--secondary);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .visualizer {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 40px;
      margin-top: 1rem;
      gap: 3px;
    }

    .bar {
      width: 4px;
      background: var(--highlight);
      border-radius: 2px;
      transition: height 0.15s ease;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 0.8rem 1.2rem;
      }
      
      .logo-text {
        font-size: 1.1rem;
      }
      
      .logo-text span {
        font-size: 0.6rem;
      }
      
      .logo-img {
        height: 35px;
        width: 35px;
      }
      
      body {
        padding: 80px 15px 100px;
      }
      
      .box {
        padding: 2rem 1.5rem;
      }
      
      .box h2 {
        font-size: 1.5rem;
      }
      
      .input-container {
        flex-direction: column;
      }
      
      .input-container button {
        width: 100%;
        justify-content: center;
      }
      
      .music-player {
        padding: 1.5rem;
      }
      
      .battery-container {
        padding: 0.4rem 1rem;
        font-size: 0.8rem;
      }
      
      #pair-result .code-display {
        font-size: 1.4rem;
      }
    }

    @media (max-width: 480px) {
      .logo-text {
        font-size: 0.9rem;
      }
      
      .box h2 {
        font-size: 1.2rem;
      }
      
      .input-container input {
        font-size: 0.9rem;
        padding: 0.8rem 1rem;
      }
      
      .input-container button {
        font-size: 0.7rem;
        padding: 0.8rem 1.2rem;
      }
      
      #pair-result .code-display {
        font-size: 1.2rem;
      }
      
      .play-btn {
        width: 50px;
        height: 50px;
      }
      
      .play-btn i {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="animated-bg"></div>
  
  <!-- Particle Background -->
  <div id="particles-js"></div>

  <!-- Header -->
  <header class="header">
    <div class="logo-container">
      <img src="https://files.catbox.moe/99ofzd.jpg" alt="NAPPIER-XMD Logo" class="logo-img">
      <div class="logo-text">
        NAPPIER-XMD
        <span>⚡ Powered by lycifer</span>
      </div>
    </div>
    
    <div class="battery-container">
      <i class="fas fa-battery-full battery-icon" id="battery-icon"></i>
      <span id="battery-level">--%</span>
    </div>
  </header>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Pairing Box -->
    <div class="box">
      <h2>⚡ SESSION PAIRING</h2>
      <p class="subtitle">NAPPIER-XMD BOT</p>
      <p class="powered">⚡ Powered by lycifer</p>
      
      <div class="input-container">
        <input type="number" id="number" placeholder="Enter your number" required>
        <button id="submit">GET CODE</button>
      </div>
      
      <div id="pair-result">
        <p style="color: var(--muted); font-size: 0.9rem;">Enter your number and click Get Code</p>
      </div>
      
      <button id="copy-code" onclick="copyCode()">📋 COPY CODE</button>
    </div>

    <!-- Music Player -->
    <div class="music-player">
      <h3>🎵 PREMIUM SOUND</h3>
      <div class="music-title">NAPPIER-XMD THEME</div>
      <div class="music-subtitle">⚡ Powered by lycifer</div>
      
      <button class="play-btn" onclick="togglePlay()">
        <i class="fas fa-pause" id="play-icon"></i>
      </button>
      
      <div class="time-display" id="time1">0:00</div>
      
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      
      <div class="visualizer" id="visualizer"></div>
      
      <audio id="audio1" src="https://files.catbox.moe/svi5pb.mp3" loop></audio>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Particles
    particlesJS('particles-js', {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: ["#00ff88", "#ff2e63", "#7209b7", "#0099ff"] },
        shape: { type: "circle" },
        opacity: { 
          value: 0.5, 
          random: true,
          anim: { enable: true, speed: 1, opacity_min: 0.1, sync: false }
        },
        size: { 
          value: 3, 
          random: true,
          anim: { enable: true, speed: 4, size_min: 0.3, sync: false }
        },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#00ff88",
          opacity: 0.2,
          width: 1
        },
        move: {
          enable: true,
          speed: 2,
          direction: "none",
          random: true,
          out_mode: "out",
          attract: { enable: false, rotateX: 600, rotateY: 1200 }
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" },
          resize: true
        }
      },
      retina_detect: true
    });

    // DOM
    const pairResult = document.getElementById("pair-result");
    const submitBtn = document.getElementById("submit");
    const numberInput = document.getElementById("number");
    const copyCodeBtn = document.getElementById("copy-code");

    // Copy
    async function copyCode() {
      const codeText = pairResult.querySelector('.code-display');
      if (!codeText) return;
      
      const code = codeText.textContent;
      try {
        await navigator.clipboard.writeText(code);
        copyCodeBtn.textContent = "✅ COPIED!";
        copyCodeBtn.style.borderColor = "#00ff88";
        copyCodeBtn.style.color = "#00ff88";
        setTimeout(() => {
          copyCodeBtn.textContent = "📋 COPY CODE";
          copyCodeBtn.style.borderColor = "";
          copyCodeBtn.style.color = "";
        }, 2000);
      } catch (err) {
        console.error('Copy failed:', err);
      }
    }

    // Submit
    submitBtn.addEventListener("click", async () => {
      const raw = numberInput.value.replace(/[^0-9]/g, "");
      
      if (!raw || raw.length < 10) {
        pairResult.innerHTML = `<p class="error">⚠️ Please enter a valid phone number</p>`;
        copyCodeBtn.style.display = "none";
        return;
      }
      
      pairResult.innerHTML = `<p class="success">⏳ Processing request...</p>`;
      copyCodeBtn.style.display = "none";
      
      try {
        const { data } = await axios(`/code?number=${raw}`);
        const code = data.code || "ERROR";
        
        if (code === "ERROR" || code.includes("Service")) {
          pairResult.innerHTML = `<p class="error">❌ Service unavailable. Try again.</p>`;
        } else {
          pairResult.innerHTML = `
            <div>
              <p style="color: var(--muted); font-size: 0.8rem; margin-bottom: 0.5rem;">🔑 Your Pairing Code</p>
              <div class="code-display">${code}</div>
            </div>
          `;
          copyCodeBtn.style.display = "inline-block";
        }
      } catch (error) {
        pairResult.innerHTML = `<p class="error">❌ Network error. Please try again.</p>`;
        copyCodeBtn.style.display = "none";
      }
    });

    // Enter key
    numberInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") submitBtn.click();
    });

    // Music
    const audio = document.getElementById('audio1');
    const playIcon = document.getElementById('play-icon');
    const timeDisplay = document.getElementById('time1');
    const progressBar = document.getElementById('progress-bar');
    const visualizer = document.getElementById('visualizer');

    for (let i = 0; i < 25; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = `${Math.random() * 30 + 8}px`;
      visualizer.appendChild(bar);
    }
    const bars = document.querySelectorAll('.bar');

    document.addEventListener('click', function initAudio() {
      audio.play().catch(() => {});
      document.removeEventListener('click', initAudio);
    }, { once: true });

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playIcon.classList.replace('fa-play', 'fa-pause');
        animateVisualizer();
      } else {
        audio.pause();
        playIcon.classList.replace('fa-pause', 'fa-play');
      }
    }

    function updateTimeDisplay() {
      const m = Math.floor(audio.currentTime / 60);
      const s = Math.floor(audio.currentTime % 60);
      timeDisplay.textContent = `${m}:${String(s).padStart(2, '0')}`;
      progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
      if (!audio.paused) requestAnimationFrame(updateTimeDisplay);
    }

    function animateVisualizer() {
      if (!audio.paused) {
        bars.forEach(bar => {
          bar.style.height = `${Math.random() * 40 + 8}px`;
        });
        requestAnimationFrame(animateVisualizer);
      }
    }

    audio.addEventListener('timeupdate', updateTimeDisplay);

    // Battery
    async function updateBattery() {
      if (navigator.getBattery) {
        try {
          const battery = await navigator.getBattery();
          const updateUI = () => {
            const pct = Math.round(battery.level * 100);
            document.getElementById('battery-level').textContent = `${pct}%`;
          };
          battery.addEventListener('levelchange', updateUI);
          battery.addEventListener('chargingchange', updateUI);
          updateUI();
        } catch (e) {}
      }
    }
    updateBattery();

    // Page load animation
    document.body.style.opacity = '0';
    document.body.style.transform = 'translateY(20px)';
    setTimeout(() => {
      document.body.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      document.body.style.opacity = '1';
      document.body.style.transform = 'translateY(0)';
    }, 100);
  </script>
</body>
</html>
